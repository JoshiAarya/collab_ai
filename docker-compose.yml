version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: collabai-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongodb_data:/data/db
    networks:
      - collabai-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: collabai-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/collabai?authSource=admin
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
    depends_on:
      - mongodb
    networks:
      - collabai-network
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: collabai-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      VITE_API_URL: http://localhost:8080
    depends_on:
      - backend
    networks:
      - collabai-network
    volumes:
      - ./frontend:/app
      - /app/node_modules

networks:
  collabai-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
