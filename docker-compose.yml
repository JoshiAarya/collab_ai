version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: collabai-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongodb_data:/data/db
    networks:
      - collabai-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
      # Vite vars are baked in at build time. Point the built frontend at the
      # backend that serves it (same container, port 8080).
      args:
        VITE_API_BASE_URL: http://localhost:8080
        VITE_WS_BASE_URL: ws://localhost:8080
    container_name: collabai-app
    restart: unless-stopped
    # The container serves BOTH the API and the built frontend on 8080.
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/collabai?authSource=admin
      CORS_ORIGINS: http://localhost:8080
      # Secrets — provided via a root .env file (see .env.example). The :? form
      # makes `docker compose up` fail fast with a clear message if they're unset.
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      GROQ_API_KEY: ${GROQ_API_KEY:?Set GROQ_API_KEY in a .env file next to docker-compose.yml}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Set ENCRYPTION_KEY (64-char hex) in a .env file next to docker-compose.yml}
    depends_on:
      - mongodb
    networks:
      - collabai-network

networks:
  collabai-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
