version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: collabai-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongodb_data:/data/db
    networks:
      - collabai-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: collabai-app
    restart: unless-stopped
    ports:
      - "5173:5173"
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/collabai?authSource=admin
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      VITE_API_URL: http://localhost:8080
    depends_on:
      - mongodb
    networks:
      - collabai-network

networks:
  collabai-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
