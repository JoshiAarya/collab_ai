version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: collabai-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?Set MONGO_ROOT_PASSWORD in .env}
    volumes:
      - mongodb_data:/data/db
    networks:
      - collabai-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: collabai-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5173:5173"
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD}@mongodb:27017/collabai?authSource=admin
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
    depends_on:
      - mongodb
    networks:
      - collabai-network

networks:
  collabai-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
